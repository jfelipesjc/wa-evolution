<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark light">
<title>wa-evolution · Manager</title>
<style>
  :root{
    /* EVOLUTION — near-black base, dark green-tinted surfaces, emerald/WhatsApp-green accent */
    --bg:#0b0f0e; --bg2:#0d1413;
    --panel:#101816; --panel2:#13201d; --panel3:#18302a;
    --panel-solid:#101816;
    --border:rgba(255,255,255,.07); --border-soft:rgba(255,255,255,.045);
    --stroke-strong:rgba(31,206,109,.30);
    --text:#e7f3ee; --muted:#8aa39a; --muted2:#5f776e;
    --accent:#1fce6d; --accent2:#00a884; --accent-soft:rgba(31,206,109,.12);
    --accent-glow:rgba(31,206,109,.45);
    --ok:#1fce6d; --ok-soft:rgba(31,206,109,.12); --ok-glow:rgba(31,206,109,.4);
    --danger:#f0566d; --danger-bg:rgba(240,86,109,.12);
    --warn:#f5a623; --warn-soft:rgba(245,166,35,.12);
    --ring:rgba(31,206,109,.38);
    --shadow:0 1px 0 rgba(255,255,255,.03) inset,0 12px 28px -18px rgba(0,0,0,.8);
    --shadow-lg:0 26px 60px -24px rgba(0,0,0,.9);
    --radius:14px; --radius-sm:10px;
    --grad-brand:linear-gradient(140deg,#1fce6d,#00a884);
    --sidebar-w:248px;
  }
  html[data-theme="light"]{
    --bg:#f1f5f3; --bg2:#e8eeeb;
    --panel:#ffffff; --panel2:#f4f8f6; --panel3:#e7f1ec;
    --panel-solid:#ffffff;
    --border:rgba(15,40,30,.12); --border-soft:rgba(15,40,30,.07);
    --stroke-strong:rgba(0,168,132,.4);
    --text:#0f201b; --muted:#4d6359; --muted2:#7a8e85;
    --accent:#089a55; --accent2:#00876a; --accent-soft:rgba(8,154,85,.12);
    --accent-glow:rgba(8,154,85,.28);
    --ok:#089a55; --ok-soft:rgba(8,154,85,.1); --ok-glow:rgba(8,154,85,.3);
    --danger:#d6203c; --danger-bg:rgba(214,32,60,.08);
    --warn:#b06a00; --warn-soft:rgba(176,106,0,.12);
    --ring:rgba(8,154,85,.3);
    --shadow:0 1px 2px rgba(15,40,30,.05),0 12px 30px -20px rgba(15,40,30,.22);
    --shadow-lg:0 24px 56px -22px rgba(15,40,30,.28);
  }
  *{box-sizing:border-box}
  html,body{height:100%;overflow-x:hidden}
  body{
    margin:0;
    font:14px/1.55 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    min-height:100vh;position:relative;
  }
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline;text-underline-offset:3px}
  code{background:var(--panel3);border:1px solid var(--border-soft);border-radius:6px;padding:1.5px 6px;font:12px/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  ::selection{background:rgba(31,206,109,.28);color:#fff}

  /* ===================== APP SHELL ===================== */
  #app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh;width:100%}
  #app.no-shell{grid-template-columns:1fr}
  #app.list-mode{grid-template-columns:1fr}

  /* ---------- sidebar ---------- */
  .sidebar{
    grid-column:1;display:flex;flex-direction:column;
    background:var(--bg2);border-right:1px solid var(--border);
    position:sticky;top:0;height:100vh;z-index:40;
  }
  #app.list-mode .sidebar{display:none}
  .sb-brand{display:flex;align-items:center;gap:11px;padding:18px 16px 14px;cursor:pointer;user-select:none;border-bottom:1px solid var(--border-soft)}
  .sb-brand .logo{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:var(--grad-brand);box-shadow:inset 0 0 0 1px rgba(255,255,255,.16);flex:none}
  .sb-brand .logo svg{width:18px;height:18px}
  .sb-brand h1{font-size:15px;margin:0;font-weight:700;letter-spacing:-.02em;line-height:1.1}
  .sb-brand h1 span{display:block;color:var(--muted2);font-weight:500;font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;margin-top:3px}

  .sb-nav{flex:1;overflow-y:auto;padding:10px 10px 12px;scrollbar-width:thin}
  .sb-nav::-webkit-scrollbar{width:6px}
  .sb-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px}
  .sb-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.16em;color:var(--muted2);padding:14px 12px 8px;display:flex;align-items:center;justify-content:space-between;cursor:default;user-select:none}
  .sb-label.collapsible{cursor:pointer}
  .sb-label.collapsible:hover{color:var(--muted)}
  .sb-label .chev{transition:.2s;width:14px;height:14px}
  .sb-label.collapsed .chev{transform:rotate(-90deg)}
  .sb-group{display:flex;flex-direction:column;gap:2px;overflow:hidden;transition:max-height .22s ease}
  .sb-group.collapsed{max-height:0!important}
  .nav-item{
    display:flex;align-items:center;gap:11px;width:100%;text-align:left;
    padding:10px 12px;border-radius:9px;color:var(--muted);background:transparent;border:1px solid transparent;
    cursor:pointer;font-size:13.5px;font-weight:500;min-height:42px;transition:all .16s;position:relative;
  }
  .nav-item:hover{color:var(--text);background:rgba(255,255,255,.035)}
  .nav-item.active{color:#fff;background:var(--accent-soft);border-color:color-mix(in srgb,var(--accent) 32%,transparent)}
  html[data-theme="light"] .nav-item.active{color:var(--accent2)}
  .nav-item.active::before{content:"";position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:3px;background:var(--accent)}
  .nav-item.active svg{color:var(--accent);opacity:1}
  .nav-item svg{width:18px;height:18px;flex:none;opacity:.75;transition:.16s}

  .sb-inst{padding:10px 10px 6px}
  .sb-inst-card{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:11px;background:var(--panel2);border:1px solid var(--border-soft)}
  .sb-inst-card .nm{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
  .sb-back{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:12.5px;font-weight:500;padding:9px 12px;border-radius:9px;cursor:pointer;border:1px solid transparent;transition:.16s}
  .sb-back:hover{color:var(--text);background:var(--panel2)}
  .sb-back svg{width:15px;height:15px}

  /* ---------- topbar (detail header, always visible on detail) ---------- */
  .topbar{
    display:flex;align-items:center;gap:12px;height:58px;padding:0 16px;
    border-bottom:1px solid var(--border);background:var(--bg2);
    position:sticky;top:0;z-index:25;
  }
  .topbar .crumb-t{font-weight:600;font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .topbar .spacer{flex:1}
  .hamburger{display:none;place-items:center;width:42px;height:42px;border-radius:10px;background:var(--panel2);border:1px solid var(--border);color:var(--text);cursor:pointer;flex:none;transition:.16s}
  .hamburger:hover{background:var(--panel3)}
  .hamburger svg{width:19px;height:19px}
  .top-avatar{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:13px;color:#04140d;background:var(--grad-brand);flex:none}

  /* ---------- content ---------- */
  .content{grid-column:2;min-width:0;display:flex;flex-direction:column}
  #app.list-mode .content,#app.no-shell .content{grid-column:1}
  main{width:100%;max-width:1600px;margin:0;padding:clamp(18px,3vw,32px) clamp(16px,3vw,36px) 80px}

  .page-head{display:flex;align-items:center;gap:14px;margin:0 0 20px;flex-wrap:wrap}
  .page-head h2{margin:0;font-size:clamp(22px,3vw,30px);font-weight:700;letter-spacing:-.025em;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .page-head .ph-actions{display:flex;gap:10px;align-items:center;flex:none}

  /* ===================== PRIMITIVES ===================== */
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
  input,button,select,textarea{font:inherit;border-radius:var(--radius-sm);border:1px solid var(--border)}
  input,select,textarea{background:var(--panel2);color:var(--text);padding:11px 13px;width:100%;transition:.16s}
  input::placeholder,textarea::placeholder{color:var(--muted2)}
  input:hover,select:hover,textarea:hover{border-color:var(--muted2)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--ring)}
  input[readonly]{opacity:.85;cursor:default}
  textarea{resize:vertical;min-height:80px}
  button{background:var(--panel2);color:var(--text);padding:11px 16px;cursor:pointer;transition:all .16s;width:auto;font-weight:500;min-height:42px;display:inline-flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.005em}
  button:hover{border-color:var(--stroke-strong);background:var(--panel3)}
  button:active{transform:translateY(1px)}
  button:focus-visible,a:focus-visible,.nav-item:focus-visible,.inst:focus-visible,.sb-back:focus-visible{outline:none;box-shadow:0 0 0 3px var(--ring);border-radius:var(--radius-sm)}
  button.primary{background:var(--grad-brand);border-color:transparent;color:#04140d;box-shadow:0 8px 22px -10px var(--accent-glow);font-weight:600}
  button.primary:hover{filter:brightness(1.06);transform:translateY(-1px)}
  button.danger{color:var(--danger);border-color:color-mix(in srgb,var(--danger) 38%,var(--border));background:transparent}
  button.danger:hover{background:var(--danger-bg);border-color:var(--danger)}
  button.ghost{background:transparent}
  button.ghost:hover{background:var(--panel2)}
  button.sm{padding:8px 13px;font-size:12.5px;min-height:36px}
  button svg{width:15px;height:15px;flex:none}
  .icon-btn{display:inline-grid;place-items:center;width:42px;height:42px;border-radius:10px;background:var(--panel2);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:.16s;flex:none;min-height:42px}
  .icon-btn:hover{color:var(--text);border-color:var(--stroke-strong);background:var(--panel3)}
  .icon-btn svg{width:17px;height:17px}
  .icon-btn.sm{width:34px;height:34px;min-height:34px}
  .icon-btn.sm svg{width:15px;height:15px}
  .icon-btn.logout{color:var(--danger);border-color:color-mix(in srgb,var(--danger) 30%,var(--border))}
  .icon-btn.logout:hover{background:var(--danger-bg);border-color:var(--danger)}

  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:clamp(16px,2.5vw,22px);margin-bottom:16px;box-shadow:var(--shadow)}
  .card h2{margin:0 0 6px;font-size:17px;font-weight:600;letter-spacing:-.02em}
  .card.empty,.empty{text-align:center;color:var(--muted);padding:50px 20px}

  /* ---------- search/filter toolbar ---------- */
  .listbar{display:flex;gap:12px;margin:0 0 18px;flex-wrap:wrap}
  .listbar .search{flex:1;min-width:200px;position:relative}
  .listbar .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--muted2);pointer-events:none}
  .listbar .search input{padding-left:38px}
  .listbar select{width:auto;min-width:170px}

  /* ---------- instances grid ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),1fr));gap:16px}
  .inst{
    position:relative;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    padding:16px;display:flex;flex-direction:column;gap:13px;transition:all .18s;
    box-shadow:var(--shadow);min-width:0;
  }
  .inst:hover{border-color:var(--stroke-strong);transform:translateY(-2px)}
  .inst .ihead{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .inst .iname{font-size:15.5px;font-weight:700;letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .token-box{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:9px;
    background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 22%,transparent)}
  .token-box .tk{flex:1;min-width:0;font:12px/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.02em}
  html[data-theme="light"] .token-box .tk{color:var(--accent2)}
  .token-box .tkbtn{display:inline-grid;place-items:center;width:26px;height:26px;border-radius:7px;background:transparent;border:none;color:var(--muted);cursor:pointer;transition:.15s;flex:none;min-height:0;padding:0}
  .token-box .tkbtn:hover{color:var(--accent);background:rgba(31,206,109,.1)}
  .token-box .tkbtn svg{width:15px;height:15px}

  .profile-row{display:flex;align-items:center;gap:11px}
  .avatar{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-weight:700;
    font-size:15px;color:#fff;flex:none;text-transform:uppercase}
  .av-1{background:linear-gradient(140deg,#1fce6d,#0a8f57)}
  .av-2{background:linear-gradient(140deg,#00a884,#067a63)}
  .av-3{background:linear-gradient(140deg,#34c3a0,#0e8f78)}
  .av-4{background:linear-gradient(140deg,#5fb389,#2f7a5b)}
  .avatar.lg{width:52px;height:52px;font-size:19px}
  .profile-row .pmeta{flex:1;min-width:0}
  .profile-row .pname{font-weight:600;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .profile-row .pnum{color:var(--muted);font-size:12px;font-variant-numeric:tabular-nums;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .profile-row .stats-mini{display:flex;gap:14px;flex:none}
  .stat-mini{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12.5px;font-variant-numeric:tabular-nums}
  .stat-mini svg{width:15px;height:15px;opacity:.8}

  .inst .ifoot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:2px;padding-top:13px;border-top:1px solid var(--border-soft)}

  /* status pill */
  .pill{display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:30px;font-size:11.5px;border:1px solid var(--border);font-weight:600;white-space:nowrap}
  .pill .sdot{width:7px;height:7px;border-radius:50%;flex:none}
  .pill.open{color:#5fe6a0;border-color:color-mix(in srgb,var(--ok) 36%,var(--border));background:var(--ok-soft)}
  html[data-theme="light"] .pill.open{color:#067a47}
  .pill.open .sdot{background:var(--ok);box-shadow:0 0 0 4px rgba(31,206,109,.15);animation:pulse 2.2s infinite}
  .pill.connecting{color:#f5c46a;border-color:color-mix(in srgb,var(--warn) 38%,var(--border));background:var(--warn-soft)}
  html[data-theme="light"] .pill.connecting{color:#9a5d00}
  .pill.connecting .sdot{background:var(--warn);animation:pulse 1.2s infinite}
  .pill.close{color:var(--muted);border-color:var(--border);background:var(--panel2)}
  .pill.close .sdot{background:var(--muted2)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .dot.open{background:var(--ok);box-shadow:0 0 8px var(--ok-glow)}
  .dot.connecting{background:var(--warn);animation:pulse 1.3s infinite}
  .dot.close{background:var(--muted2);opacity:.7}

  /* skeletons */
  .skel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;display:flex;flex-direction:column;gap:13px;box-shadow:var(--shadow)}
  .sk{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 37%,rgba(255,255,255,.04) 63%);background-size:400% 100%;animation:shimmer 1.5s ease infinite;border-radius:7px;height:14px}
  @keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
  .spinner{width:18px;height:18px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
  .loading{display:flex;align-items:center;gap:10px;color:var(--muted);padding:6px 0}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---------- detail dashboard pieces ---------- */
  .dash-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:16px}
  .dash-head .dname{font-size:clamp(22px,3vw,30px);font-weight:700;letter-spacing:-.025em;line-height:1.1}

  .banner{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:16px 18px;border-radius:var(--radius);
    background:var(--warn-soft);border:1px solid color-mix(in srgb,var(--warn) 36%,var(--border));margin-bottom:16px}
  .banner .bi{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;background:rgba(245,166,35,.16);color:var(--warn);flex:none}
  .banner .bi svg{width:20px;height:20px}
  .banner .btxt{flex:1;min-width:160px}
  .banner .btxt b{font-weight:600}
  .banner .btxt span{display:block;color:var(--muted);font-size:12.5px;margin-top:2px}

  .dash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
  .dstat{padding:16px;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;align-items:center;gap:13px}
  .dstat .di{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent);flex:none}
  .dstat .di svg{width:20px;height:20px}
  .dstat .dval{font-size:22px;font-weight:700;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums}
  .dstat .dlab{color:var(--muted);font-size:12px;margin-top:4px}

  .dash-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;color:var(--muted2);font-size:11.5px;margin-top:8px;padding:14px 4px 0;border-top:1px solid var(--border-soft)}
  .dash-foot .fbrand{display:flex;align-items:center;gap:8px;font-weight:600;color:var(--muted)}
  .dash-foot .fbrand svg{width:15px;height:15px;color:var(--accent)}

  /* ---------- QR ---------- */
  .qr{display:flex;flex-direction:column;align-items:center;gap:13px;padding:16px;background:var(--panel2);border-radius:var(--radius);width:fit-content;max-width:100%;margin:6px 0;border:1px solid var(--border)}
  .qr img{width:228px;height:228px;max-width:60vw;image-rendering:pixelated;border-radius:10px;background:#fff;padding:12px}
  .qr small{color:var(--muted);font-weight:500;max-width:300px;text-align:center}
  .qr small b{color:var(--text)}
  .qr .ph{width:228px;height:228px;max-width:60vw;display:grid;place-items:center;color:var(--muted);gap:10px}
  .qr .paircode{font:800 36px/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:.2em;color:var(--accent);padding:20px 16px 10px;text-align:center;word-break:break-all}

  label{font-size:11.5px;color:var(--muted);display:block;margin-bottom:7px;font-weight:500;letter-spacing:.02em}
  .field{margin-bottom:14px}
  .field:last-child{margin-bottom:0}
  .hide{display:none!important}

  /* ---------- table ---------- */
  .table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border-soft);-webkit-overflow-scrolling:touch;max-width:100%}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:420px}
  th,td{text-align:left;padding:11px 15px;border-bottom:1px solid var(--border-soft);word-break:break-word;max-width:340px}
  td{font-variant-numeric:tabular-nums}
  tr:last-child td{border-bottom:none}
  thead th{color:var(--muted);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;background:rgba(255,255,255,.02)}
  tbody tr:hover{background:rgba(255,255,255,.025)}
  .count-badge{font-size:12px;color:var(--muted);margin-bottom:14px;display:inline-flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--border-soft);padding:6px 12px;border-radius:20px;font-weight:500}

  .toggle{display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:10px;background:var(--panel2);border:1px solid var(--border-soft);border-radius:11px;cursor:pointer;transition:.16s}
  .toggle:hover{border-color:var(--border);background:var(--panel3)}
  .toggle:has(input:checked){border-color:color-mix(in srgb,var(--accent) 38%,var(--border));background:var(--accent-soft)}
  .toggle input{width:18px;height:18px;flex:none;accent-color:var(--accent);cursor:pointer;margin:0}
  .toggle span{color:var(--text);font-size:13.5px;font-weight:450}

  .kv{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border-soft)}
  .kv:last-child{border-bottom:none}
  .kv b{font-weight:450;color:var(--muted)}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12.5px}

  .section-title{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.14em;color:var(--accent);margin:4px 0 14px}
  html[data-theme="light"] .section-title{color:var(--accent2)}

  /* ---------- login ---------- */
  #loginCard{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);
    background-image:radial-gradient(900px 540px at 80% -10%,rgba(31,206,109,.16),transparent 56%),radial-gradient(800px 480px at 12% 110%,rgba(0,168,132,.12),transparent 55%)}
  .login-card{width:100%;max-width:420px;background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:clamp(24px,5vw,34px);box-shadow:var(--shadow-lg)}
  .login-card .lg-logo{width:54px;height:54px;border-radius:15px;display:grid;place-items:center;background:var(--grad-brand);box-shadow:inset 0 1px 0 rgba(255,255,255,.35);margin-bottom:18px}

  .login-card button.primary{width:100%;margin-top:8px;padding:13px;font-size:15px}

  /* ---------- modal ---------- */
  .modal-bg{position:fixed;inset:0;z-index:60;background:rgba(4,8,7,.66);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;visibility:hidden;transition:.2s}
  .modal-bg.show{opacity:1;visibility:visible}
  .modal{width:100%;max-width:460px;background:var(--panel);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-lg);transform:translateY(10px) scale(.98);transition:.2s;max-height:92vh;overflow-y:auto}
  .modal-bg.show .modal{transform:none}
  .modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 20px;border-bottom:1px solid var(--border-soft)}
  .modal-head h3{margin:0;font-size:17px;font-weight:600;letter-spacing:-.02em}
  .modal-body{padding:20px}
  .modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 20px;border-top:1px solid var(--border-soft)}
  .x-btn{display:inline-grid;place-items:center;width:32px;height:32px;border-radius:8px;background:transparent;border:none;color:var(--muted);cursor:pointer;min-height:0;padding:0}
  .x-btn:hover{color:var(--text);background:var(--panel2)}
  .x-btn svg{width:18px;height:18px}

  /* ---------- toast ---------- */
  .toast{position:fixed;bottom:24px;right:24px;left:auto;background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--accent);padding:14px 17px;border-radius:12px;max-width:min(360px,calc(100vw - 36px));opacity:0;transform:translateY(12px) scale(.97);transition:.22s;z-index:80;box-shadow:var(--shadow-lg);font-size:13.5px;display:flex;align-items:center;gap:11px}
  .toast.show{opacity:1;transform:none}
  .toast.err{border-left-color:var(--danger)}
  .toast.ok{border-left-color:var(--ok)}
  .toast .ti{flex:none;width:16px;height:16px}

  /* drawer overlay (mobile detail) */
  .overlay{display:none}

  /* ===================== RESPONSIVE ===================== */
  @media (max-width:1023px){
    #app:not(.list-mode):not(.no-shell){grid-template-columns:1fr}
    .hamburger{display:grid}

      position:fixed;top:0;left:0;bottom:0;width:min(86vw,290px);height:100dvh;

  }
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.05ms!important}}
</style>

<body>

<!-- login -->

</div>

<!-- nova instância modal -->

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
const $ = s => document.querySelector(s);
const el = (t,p={})=>Object.assign(document.createElement(t),p);
let BASE = localStorage.getItem('wae_base') || '';
let KEY  = localStorage.getItem('wae_key')  || '';
let listTimer=null, qrTimer=null;
let cur=null, curTab='overview';
let INSTMAP={};
let RAWLIST=[];           // last fetched instances (for client filter)
let revealToken=false;    // global token reveal toggle
const navGroupState={};   // collapsible nav groups

/* ---------- drawer ---------- */
function closeDrawer(){$('#app').classList.remove('drawer-open');}
function toggleDrawer(){$('#app').classList.toggle('drawer-open');}
$('#hamburger').onclick=toggleDrawer;
$('#overlay').onclick=closeDrawer;

/* ---------- theme ---------- */
const ICON_MOON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
const ICON_SUN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  const ic=t==='dark'?ICON_MOON:ICON_SUN;
  ['#themeBtn','#listThemeBtn'].forEach(s=>{const b=$(s);if(b)b.innerHTML=ic;});
}
applyTheme(localStorage.getItem('wae_theme')||'dark');
function toggleTheme(){const n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';localStorage.setItem('wae_theme',n);applyTheme(n);}
$('#themeBtn').onclick=toggleTheme;
$('#listThemeBtn').onclick=toggleTheme;

function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
const ICONS={
  ok:'<svg class="ti" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>',
  err:'<svg class="ti" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>',
  info:'<svg class="ti" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/></svg>'
};
function toast(msg,kind){const t=$('#toast');t.innerHTML=(ICONS[kind]||ICONS.info)+'<span></span>';t.querySelector('span').textContent=msg;t.className='toast show '+(kind||'');clearTimeout(toast._t);toast._t=setTimeout(()=>t.className='toast',2800);}

async function api(path, opts={}){
  const r = await fetch(BASE.replace(/\/$/,'')+path,{...opts,headers:{'apikey':KEY,'Content-Type':'application/json',...(opts.headers||{})}});
  const txt=await r.text(); let data; try{data=txt?JSON.parse(txt):null}catch(e){data=txt}
  if(!r.ok) throw new Error((data&&data.message)||r.status+' '+r.statusText);
  return data;
}
const STL={open:'Conectado',connecting:'Conectando',close:'Desconectado'};
const sc=s=>s==='open'?'open':(s==='connecting'?'connecting':'close');
function pill(s){const k=sc(s);return `<span class="pill ${k}"><span class="sdot"></span>${STL[s]||esc(s)}</span>`}

/* ---------- token (global apikey, masked) ---------- */
const ICON_COPY='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
const ICON_EYE='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>';
const ICON_EYE_OFF='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10 10 0 0 1 12 20c-7 0-11-7-11-7a18 18 0 0 1 5.06-5.94M9.9 4.24A9 9 0 0 1 12 4c7 0 11 7 11 7a18 18 0 0 1-2.16 3.19M1 1l22 22M9.9 9.9a3 3 0 0 0 4.2 4.2"/></svg>';
function maskToken(k){
  if(!k) return '••••••••';
  // grouped, mostly masked, evolution-style
  return '••••••••_••••_••••_••••_'+'•'.repeat(Math.min(8,Math.max(4,k.length)));
}
function tokenRow(){
  const shown=revealToken?esc(KEY||''):maskToken(KEY);
  return `<div class="token-box">
    <span class="tk" title="API key global">${shown}</span>
    <button class="tkbtn" title="${revealToken?'Ocultar':'Revelar'}" onclick="toggleReveal()">${revealToken?ICON_EYE_OFF:ICON_EYE}</button>
    <button class="tkbtn" title="Copiar token" onclick="copyToken()">${ICON_COPY}</button>
  </div>`;
}
window.toggleReveal=()=>{revealToken=!revealToken; if(cur)loadTab(); refreshList().catch(()=>{});};
window.copyToken=async()=>{
  try{ if(navigator.clipboard&&navigator.clipboard.writeText){await navigator.clipboard.writeText(KEY||'');}
    else{const ta=el('textarea',{value:KEY||''});document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();}
    toast('Token copiado','ok');
  }catch(e){toast('Não foi possível copiar','err');}
};

/* ---------- section icons ---------- */
const TAB_ICONS={
  overview:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/></svg>',
  send:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>',
  webhook:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-9.33-5M4 12a6 6 0 0 0 10 4.46M9 12a3 3 0 1 1 6 0"/><circle cx="6" cy="16" r="2.4"/><circle cx="18" cy="16" r="2.4"/></svg>',
  settings:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
  proxy:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>',
  chats:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-9.9 8.4L3 21l1.1-8.1A8.5 8.5 0 1 1 21 11.5z"/></svg>',
  contacts:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13A4 4 0 0 1 16 11"/></svg>',
  groups:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13A4 4 0 0 1 16 11"/></svg>',
};

function renderNav(){

  nav.appendChild(back);
  // instance chip
  const wrap=el('div',{className:'sb-inst'});
  wrap.innerHTML=`<div class="sb-inst-card"><span class="dot ${sc('close')}" id="navDot"></span><span class="nm">${esc(cur)}</span></div>`;
  nav.appendChild(wrap);
  // grouped sections
  for(const g of NAV_GROUPS){
    const groupEl=el('div',{className:'sb-group'});
    if(g.label){
      if(navGroupState[g.id]===undefined)navGroupState[g.id]=false; // expanded by default
      const collapsed=navGroupState[g.id];
      const lab=el('div',{className:'sb-label collapsible'+(collapsed?' collapsed':'')});
      lab.innerHTML=esc(g.label)+'<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';
      lab.onclick=()=>{navGroupState[g.id]=!navGroupState[g.id];renderNav();};

    for(const [id,label] of g.items){
      groupEl.appendChild(navItem({label,active:id===curTab,icon:TAB_ICONS[id]||'',

async function refreshList(){
  try{
    const list=await api('/instance/fetchInstances');
    RAWLIST=Array.isArray(list)?list:[];
    INSTMAP={};
    RAWLIST.forEach(it=>{const n=it.instanceName||it.name;INSTMAP[n]=it;});
    renderList();
    // lazily fetch contact counts for connected instances (cheap, best-effort)
    RAWLIST.forEach(it=>{
      const n=it.instanceName||it.name;
      if(sc(it.connectionStatus||it.state)==='open' && it.__contacts==null){
        api('/chat/findContacts/'+encodeURIComponent(n))
          .then(rs=>{if(Array.isArray(rs)){it.__contacts=rs.length;renderList();}})
          .catch(()=>{});
      }
    });
  }catch(e){toast('Falha ao listar: '+e.message,'err'); if(/401|apikey/i.test(e.message))showLogin();}
}

// startPair só é disparado por clique. mode: 'qr' | 'code'. Abre num MODAL.
window.startPair=(mode)=>{
  $('#pmTitle').textContent = mode==='code' ? 'Código de pareamento' : 'Conectar via QR Code';
  const lbl=mode==='code'?'gerando código…':'gerando QR…';
  $('#qrBox').innerHTML=`<div class="ph"><span class="spinner"></span><small>${lbl}</small></div>`;
  $('#pairModal').classList.add('show');
  pollQR(encodeURIComponent(cur));
};
function closePairModal(){$('#pairModal').classList.remove('show');stopQR();}
$('#closePair').onclick=closePairModal;
$('#pairModal').onclick=e=>{if(e.target===$('#pairModal'))closePairModal();};
async function pollQR(I){
  const tick=async()=>{
    try{const r=await api('/instance/connect/'+I);
      if(r.connectionStatus==='open'){closePairModal();toast('Conectado!','ok');loadTab();return;}
      const b=$('#qrBox'); if(!b)return;
      if(r.pairingCode){
        const c=esc(r.pairingCode);
        b.innerHTML=`<div class="paircode">${c}</div><small>No WhatsApp do número: Aparelhos conectados → Conectar → <b>Conectar com número de telefone</b> → digite o código acima.</small>`;
        return;
      }
      const img=r.base64||(r.code&&r.code.startsWith('data:')?r.code:'');
      if(img)b.innerHTML=`<img src="${img}" alt="QR Code"><small>aponte a câmera do WhatsApp</small>`;
    }catch(e){}
  };
  await tick(); stopQR(); qrTimer=setInterval(tick,3000);
}

}
window.saveSettings=async()=>{
  const g=k=>$('#set_'+k); const b={rejectCall:g('rejectCall').checked,msgCall:g('msgCall').value,alwaysOnline:g('alwaysOnline').checked,readMessages:g('readMessages').checked,readStatus:g('readStatus').checked,groupsIgnore:g('groupsIgnore').checked,syncFullHistory:g('syncFullHistory').checked};
  try{await api('/settings/set/'+encodeURIComponent(cur),{method:'POST',body:JSON.stringify(b)});toast('Settings salvos','ok');}catch(e){toast(e.message,'err');}
}

async function tabProxy(I){
  body(loadingCard());
  let p={}; try{p=await api('/proxy/find/'+I)||{};}catch(e){}
  body(`<div class="card">
    <div class="section-title">Proxy</div>
    <label class="toggle"><input type="checkbox" id="px_enabled" ${p.enabled?'checked':''}><span>Proxy habilitado</span></label>
    <div class="row" style="margin-top:12px"><div class="field" style="flex:2;min-width:160px"><label>Host</label><input id="px_host" value="${esc(p.host||'')}"></div>
    <div class="field" style="flex:1;min-width:90px"><label>Porta</label><input id="px_port" value="${esc(p.port||'')}"></div></div>
    <div class="field"><label>Protocolo</label><input id="px_protocol" value="${esc(p.protocol||'http')}"></div>
    <div class="row"><div class="field" style="flex:1;min-width:140px"><label>Usuário</label><input id="px_username" value="${esc(p.username||'')}"></div>
    <div class="field" style="flex:1;min-width:140px"><label>Senha</label><input id="px_password" type="password" value="${esc(p.password||'')}"></div></div>
    <button class="primary" onclick="saveProxy()">Salvar proxy</button>
  </div>`);
}
window.saveProxy=async()=>{
  const g=k=>$('#px_'+k); const b={enabled:g('enabled').checked,host:g('host').value,port:g('port').value,protocol:g('protocol').value,username:g('username').value,password:g('password').value};
  try{await api('/proxy/set/'+encodeURIComponent(cur),{method:'POST',body:JSON.stringify(b)});toast('Proxy salvo','ok');}catch(e){toast(e.message,'err');}
}

async function tabList(I,path,title,cols){
  body(loadingCard());
  let rows=[]; try{rows=await api(path+I)||[];}catch(e){toast(e.message,'err');}
  if(!Array.isArray(rows)||!rows.length){body(`<div class="card empty">Nenhum ${esc(title.toLowerCase())} capturado ainda.</div>`);return;}
  let h=`<div class="card"><span class="count-badge">${rows.length} ${esc(title.toLowerCase())}</span><div class="table-wrap"><table><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>`;
  for(const r of rows.slice(0,200)) h+=`<tr>${cols.map(c=>`<td>${esc(r[c]??'')}</td>`).join('')}</tr>`;
  body(h+'</tbody></table></div></div>');
}
async function tabGroups(I){
  body(loadingCard());
  let rows=[]; try{rows=await api('/group/fetchAllGroups/'+I)||[];}catch(e){toast(e.message,'err');}
  if(!rows.length){body('<div class="card empty">Nenhum grupo (ou sessão offline).</div>');return;}
  let h=`<div class="card"><span class="count-badge">${rows.length} grupos</span><div class="table-wrap"><table><thead><tr><th>Assunto</th><th>JID</th><th>Membros</th></tr></thead><tbody>`;
  for(const g of rows) h+=`<tr><td>${esc(g.subject||'')}</td><td>${esc(g.id||'')}</td><td>${(g.participants||[]).length}</td></tr>`;
  body(h+'</tbody></table></div></div>');
}

/* ---------- create modal ---------- */
function openCreateModal(){
  $('#newToken').value=KEY||'';
  $('#createModal').classList.add('show');
  setTimeout(()=>$('#newName').focus(),60);
}
function closeCreateModal(){$('#createModal').classList.remove('show');}
$('#openCreate').onclick=openCreateModal;
$('#closeCreate').onclick=closeCreateModal;
$('#cancelCreate').onclick=closeCreateModal;
$('#createModal').onclick=e=>{if(e.target===$('#createModal'))closeCreateModal();};
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeCreateModal();closePairModal();}});

$('#createBtn').onclick=async()=>{
  const name=$('#newName').value.trim(); if(!name){toast('Informe um nome','err');return;}
  const number=$('#newNumber').value.trim();
  try{await api('/instance/create',{method:'POST',body:JSON.stringify({instanceName:name,...(number?{number}:{})})});
    $('#newName').value='';$('#newNumber').value='';
    closeCreateModal();
    toast(number?'Instância criada — gerando código':'Instância criada','ok');
    openInstance(name);
  }catch(e){toast(e.message,'err');}
};
$('#newName').addEventListener('keydown',e=>{if(e.key==='Enter')$('#createBtn').click();});

/* ---------- list controls ---------- */
$('#refreshBtn').onclick=refreshList;
$('#searchInput').addEventListener('input',renderList);
$('#statusFilter').addEventListener('change',renderList);

/* ---------- boot / login ---------- */
$('#home').onclick=()=>{if(KEY)showList();};
$('#home').onkeydown=e=>{if((e.key==='Enter'||e.key===' ')&&KEY){e.preventDefault();showList();}};
function doLogin(){BASE=$('#baseUrl').value.trim();KEY=$('#apiKey').value.trim();if(!BASE){toast('Informe a Base URL','err');return;}localStorage.setItem('wae_base',BASE);localStorage.setItem('wae_key',KEY);showList();}
$('#loginBtn').onclick=doLogin;
$('#apiKey').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
function doLogout(){localStorage.removeItem('wae_key');KEY='';showLogin();}
$('#logoutBtn').onclick=doLogout;
$('#listLogoutBtn').onclick=doLogout;

if(!BASE) BASE=location.origin;
$('#baseUrl').value=BASE; $('#apiKey').value=KEY;
if(KEY) showList(); else showLogin();
</script>
</body>
</html>
